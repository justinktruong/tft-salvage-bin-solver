<!DOCTYPE html>

<html lang="en">

    <head>

        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">

        <!-- http://getbootstrap.com/docs/5.3/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <link href="./css/styles.css" rel="stylesheet">

        <title>TFT Assistant: Salvage Bin Breakdown</title>

    </head>

    <body>

        <main class="container py-5 text-center">
            
            <div class="card border-secondary mb-4 text-start">
                <div class="card-header">
                    <h4 class="mb-0">Select Your Current Items</h4>
                </div>
                
                <div class="card-body">
                    
                    <input type="text" id="curItemSearch" class="form-control mb-3" placeholder="Search items..." aria-label="Search items">
                    
                    <div class="item-container" id="availableItems"></div> 
                    
                    <hr class="my-4 border-secondary">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0">Selected Items: </h6>   
                        <button class="btn btn-outline-danger btn-sm" type="button" id="clearBtn">Clear</button>
                    </div>
                    
                    <div class="selected-container" id="selectedItems"></div>

                </div> 
                
            </div> 

            <script type="module" src="./scripts/main.js"></script>

        </main>
        
    </body>

</html>
